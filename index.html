<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTU Econ — Topics in Labor Economics: Grade Portal</title>
<style>
  :root {
    --primary: #2F5597;
    --accent:  #4472C4;
    --light:   #BDD7EE;
    --bg:      #F4F7FB;
    --card:    #ffffff;
    --border:  #D0DCF0;
    --text:    #1a1a2e;
    --muted:   #5a6070;
    --green:   #1e7e34;
    --orange:  #b45309;
    --red:     #9b1c1c;
    --radius:  12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }
  header .course-tag {
    display: inline-block;
    background: var(--primary);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 14px;
  }
  header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--primary);
    line-height: 1.3;
  }
  header p {
    color: var(--muted);
    font-size: 0.93rem;
    margin-top: 8px;
  }

  .search-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 40px 32px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 4px 24px rgba(47,85,151,0.10);
    margin-bottom: 32px;
  }
  .search-card label {
    display: block;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--primary);
    margin-bottom: 8px;
    letter-spacing: 0.03em;
  }
  .input-row {
    display: flex;
    gap: 10px;
  }
  .search-card input {
    flex: 1;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    color: var(--text);
    background: #fafbff;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }
  .search-card input:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
  }
  .search-card button {
    padding: 12px 22px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .search-card button:hover { background: var(--accent); }
  .search-card button:active { transform: scale(0.97); }

  #error-msg {
    display: none;
    color: var(--red);
    font-size: 0.88rem;
    margin-top: 10px;
    padding: 8px 12px;
    background: #fef2f2;
    border: 1px solid #fca5a5;
    border-radius: 6px;
  }

  #result-section {
    display: none;
    width: 100%;
    max-width: 760px;
    animation: fadeUp 0.35s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(47,85,151,0.10);
    margin-bottom: 20px;
  }

  .result-header {
    background: var(--primary);
    color: #fff;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .result-header .student-name {
    font-size: 1.15rem;
    font-weight: 700;
  }
  .result-header .student-meta {
    font-size: 0.82rem;
    opacity: 0.8;
    margin-top: 3px;
  }

  .grades-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    background: var(--border);
  }
  .grade-cell {
    background: var(--card);
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .grade-cell .label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
  }
  .grade-cell .score {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--primary);
  }
  .grade-cell .score.pending {
    font-size: 1rem;
    color: #9ca3af;
    font-weight: 500;
    font-style: italic;
  }
  .grade-cell .score.grade-a-plus { color: #1e7e34; }
  .grade-cell .score.grade-a      { color: #1d6f42; }
  .grade-cell .score.grade-a-min  { color: #2e7d32; }
  .grade-cell .score.grade-b-plus { color: #b45309; }
  .grade-cell .score.grade-b      { color: #92400e; }
  .grade-cell .score.grade-c      { color: #9b1c1c; }

  .badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .badge-aplus  { background: #d1fae5; color: #065f46; }
  .badge-a      { background: #dcfce7; color: #166534; }
  .badge-amin   { background: #e0f2fe; color: #075985; }
  .badge-bplus  { background: #fef3c7; color: #92400e; }
  .badge-b      { background: #ffedd5; color: #9a3412; }
  .badge-bmin   { background: #fee2e2; color: #7f1d1d; }
  .badge-c      { background: #fee2e2; color: #991b1b; }
  .badge-d      { background: #f3f4f6; color: #6b7280; }

  .comment-section {
    padding: 24px 28px;
    border-top: 1px solid var(--border);
  }
  .comment-section h3 {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .comment-block {
    background: #f8fafd;
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 14px 18px;
    margin-bottom: 12px;
  }
  .comment-block .comment-label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .comment-block p {
    font-size: 0.92rem;
    line-height: 1.65;
    color: var(--text);
  }
  .pending-notice {
    color: #9ca3af;
    font-style: italic;
    font-size: 0.88rem;
  }
  .comment-pending {
    border-left-color: #d1d5db;
    background: #fafafa;
  }

  .scale-note {
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
  }

  footer {
    margin-top: 48px;
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>

function gradeBadge(score) {
  if (!score) return '';
  const s = score.toLowerCase();
  if (s.includes('a+'))   return '<span class="badge badge-aplus">A+</span>';
  if (s.includes('a-'))   return '<span class="badge badge-amin">A−</span>';
  if (s.includes('a'))    return '<span class="badge badge-a">A</span>';
  if (s.includes('b+'))   return '<span class="badge badge-bplus">B+</span>';
  if (s.includes('b-'))   return '<span class="badge badge-bmin">B−</span>';
  if (s.includes('b'))    return '<span class="badge badge-b">B</span>';
  if (s.includes('缺交') || s.includes('(0)')) return '<span class="badge badge-d">缺交</span>';
  if (s.includes('b+'))   return '<span class="badge badge-bplus">B+</span>';
  return '<span class="badge badge-c">C</span>';
}

function gradeClass(score) {
  if (!score) return '';
  const s = score.toLowerCase();
  if (s.includes('a+'))  return 'grade-a-plus';
  if (s.includes('a-'))  return 'grade-a-min';
  if (s.includes('a'))   return 'grade-a';
  if (s.includes('b+'))  return 'grade-b-plus';
  if (s.includes('b-'))  return 'grade-b-min';
  if (s.includes('b'))   return 'grade-b';
  return 'grade-c';
}

function lookup() {
  const raw = document.getElementById('sid-input').value.trim();
  const errEl = document.getElementById('error-msg');
  const resEl = document.getElementById('result-section');
  errEl.style.display = 'none';

  if (!raw) {
    errEl.textContent = 'Please enter your student ID.';
    errEl.style.display = 'block';
    return;
  }

  const data = GRADES[raw];
  if (!data) {
    errEl.textContent = 'Student ID not found. Please check the number and try again.';
    errEl.style.display = 'block';
    resEl.style.display = 'none';
    return;
  }

  const initials = data.name.split(' ').slice(0, 2).map(w => w[0]).join('');
  document.getElementById('res-avatar').textContent = initials;
  document.getElementById('res-name').textContent = data.name;
  document.getElementById('res-meta').textContent = raw + ' · ' + data.dept;

  const items = [
    { label: 'HW 1',               key: 'hw1' },
    { label: 'HW 2',               key: 'hw2' },
    { label: 'Reading Group',       key: 'rg'  },
    { label: 'Final Presentation',  key: 'fp'  },
    { label: 'Term Paper',          key: 'tp'  },
  ];
  let gradeHTML = '';
  items.forEach(it => {
    const val = data[it.key];
    const score = val ? val.score : null;
    gradeHTML += `<div class="grade-cell">
      <div class="label">${it.label}</div>
      <div class="score ${score ? gradeClass(score) : 'pending'}">
        ${score ? score : 'Pending'}
      </div>
      ${score ? gradeBadge(score) : ''}
    </div>`;
  });
  document.getElementById('res-grades').innerHTML = gradeHTML;

  let commBlocks = '';
  items.forEach(it => {
    const val = data[it.key];
    if (!val) return;
    const sc = val.studentComments;
    if (sc && sc.trim().length > 0) {
      commBlocks += `<div class="comment-block">
        <div class="comment-label">${it.label}</div>
        <p>${sc}</p>
      </div>`;
    }
  });
  const commHTML = commBlocks ? '<h3>Instructor Feedback</h3>' + commBlocks : '';
  document.getElementById('res-comments').innerHTML = commHTML;

  resEl.style.display = 'block';
  resEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.getElementById('sid-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookup();
});
</script>
